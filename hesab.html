<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0e">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HESAB">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@500;600&display=swap" rel="stylesheet">
<title>HESAB</title>

<style>
:root{--red:#cc1f1f;--black:#0e0e0e;--dark:#1a1a1a;--panel:#242424;--border:#3a3a3a;--mid:#999;--light:#e0e0e0;--white:#f4f4f4}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--black);color:var(--white);font-family:"Barlow",Arial,sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:subpixel-antialiased}

/* HEADER */
header{width:100%;background:var(--dark);border-bottom:3px solid var(--red);display:flex;align-items:center;gap:18px;padding:14px 24px}
.logo-wrap img{height:90px;width:auto}
.header-title{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--white);line-height:1.7}
.header-title span{display:block;font-size:13px;color:var(--light);letter-spacing:2px;font-weight:400}

/* CLOCK */
.clock-bar{width:100%;background:#111;border-bottom:1px solid #2a2a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 20px;gap:4px}
#clock-time{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:clamp(36px,10vw,60px);font-weight:900;letter-spacing:4px;color:var(--white);font-variant-numeric:tabular-nums;line-height:1}
#clock-time .colon{color:var(--red);animation:blink 1s step-start infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
#clock-date{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:clamp(11px,3vw,13px);letter-spacing:2px;color:var(--mid);text-transform:uppercase}

/* MAIN */
main{width:100%;max-width:720px;padding:20px 14px 80px;display:flex;flex-direction:column;gap:18px}

/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.card-head{background:var(--dark);border-bottom:2px solid var(--red);padding:10px 16px;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mid)}
.card-body{padding:16px}

/* INPUT */
label{display:block;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--mid);margin-bottom:8px}
input[type="text"]{background:#111;border:1px solid var(--border);border-radius:4px;color:var(--white);font-family:"Barlow",Arial,sans-serif;font-size:16px;padding:14px 14px;outline:none;transition:border-color .15s;width:100%;margin-bottom:14px;-webkit-appearance:none;border-radius:4px}
input[type="text"]:focus{border-color:var(--red)}
input[type="text"]::placeholder{color:#555}
input[type="text"].err{border-color:var(--red);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* BUTTONS */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:clamp(18px,5vw,22px);font-weight:900;letter-spacing:3px;text-transform:uppercase;border:none;border-radius:4px;padding:18px 0;cursor:pointer;transition:filter .12s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;min-height:60px;touch-action:manipulation;-webkit-appearance:none}
.btn:active{transform:scale(.96)}
.btn svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.btn-start{background:var(--red);color:#fff}
.btn-start:hover{filter:brightness(1.18)}
.btn-stopp{background:#2a2a2a;color:var(--white);border:1px solid var(--border)}
.btn-stopp:hover{border-color:var(--red);color:var(--red)}

/* STATUS */
#status-bar{display:flex;align-items:center;gap:10px;margin-top:14px;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:13px;letter-spacing:1.5px;color:#777;min-height:22px}
.dot{width:9px;height:9px;border-radius:50%;background:#444;flex-shrink:0}
.dot.on{background:#4caf50;box-shadow:0 0 7px #4caf5099;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* LOG */
#log-list{display:flex;flex-direction:column}
.log-row{display:grid;grid-template-columns:32px 1fr auto;align-items:stretch;border-bottom:1px solid var(--border);transition:background .1s;animation:si .2s ease}
.log-row:last-child{border-bottom:none}
.log-row:active{background:#2c2c2c}
@media(hover:hover){.log-row:hover{background:#2c2c2c}}
@keyframes si{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.log-num{display:flex;align-items:center;justify-content:center;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:11px;color:#555;border-right:1px solid var(--border);padding:12px 0}
.log-body{padding:10px 12px;display:flex;flex-direction:column;gap:5px}
.log-obj-name{font-size:15px;font-weight:600;color:var(--white)}
.log-times{display:flex;flex-direction:column;gap:3px}
.log-time-row{display:flex;align-items:center;gap:7px;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:13px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:2px 6px;border-radius:2px;min-width:46px;text-align:center;flex-shrink:0}
.tag-start{background:#1e3a1e;color:#6fcf6f}
.tag-stopp{background:#3a1e1e;color:#cf6f6f}
.t-time{color:var(--white);letter-spacing:1px}
.t-date{color:#666;font-size:12px}
.log-dur{display:flex;align-items:center;justify-content:center;padding:10px 12px;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:14px;color:#555;white-space:nowrap;border-left:1px solid var(--border);min-width:56px}
.log-dur.has-dur{color:#d4941a;font-weight:700}
.open-badge{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:2px 6px;border-radius:2px;background:#1a2e1a;color:#5cb85c;animation:pulse 1.4s infinite}
.empty{padding:32px 16px;text-align:center;color:#555;font-size:14px;letter-spacing:1px;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);background:var(--dark)}
.toolbar-count{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:12px;letter-spacing:2px;color:var(--mid)}
.toolbar-count b{color:var(--white);font-weight:700}
.toolbar-count .dim{color:var(--mid);font-weight:400}
.btn-row-sm{display:flex;gap:8px}
.btn-sm{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--light);border-radius:3px;padding:8px 14px;cursor:pointer;transition:border-color .12s,color .12s;min-height:36px;touch-action:manipulation}
.btn-sm:hover{border-color:var(--red);color:var(--red)}
.btn-sm:active{transform:scale(.96)}
.btn-export{background:var(--red);border-color:var(--red);color:#fff}
.btn-export:hover{filter:brightness(1.15);color:#fff}

/* MOBILE SPECIFICS */
@media(max-width:480px){
  header{padding:10px 14px;gap:12px}
  .logo-wrap img{height:54px;width:auto}
  .header-title{font-size:12px;letter-spacing:2px}
  .clock-bar{padding:12px 14px}
  main{padding:14px 10px 100px}
  .card-body{padding:14px 12px}
  .btn{font-size:20px;padding:20px 0;min-height:64px}
  .log-obj-name{font-size:14px}
  .log-time-row{font-size:12px}
  .t-date{display:none}
  .toolbar{flex-wrap:wrap;gap:8px}
  .toolbar-count{font-size:11px}
}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:6px;width:100%;max-width:420px;overflow:hidden}
.modal-head{background:var(--dark);border-bottom:2px solid var(--red);padding:12px 16px;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mid)}
.modal-body{padding:18px 16px;display:flex;flex-direction:column;gap:12px}
.modal-body label{margin-bottom:4px}
.modal-body input{margin-bottom:0}
.modal-row{display:flex;flex-direction:column;gap:6px}
.modal-foot{display:flex;gap:10px;padding:14px 16px;border-top:1px solid var(--border);background:var(--dark)}
.modal-foot .btn-sm{flex:1;text-align:center;padding:10px 0}
.btn-danger{background:#3a1a1a;border-color:#6a2a2a;color:#e06060}
.btn-danger:hover{background:#5a1a1a;border-color:var(--red);color:#ff8080}
.btn-save{background:var(--red);border-color:var(--red);color:#fff}
.btn-save:hover{filter:brightness(1.15);color:#fff}

/* delete button on rows */
.log-del{display:flex;align-items:center;justify-content:center;width:32px;background:none;border:none;color:#555;cursor:pointer;font-size:16px;flex-shrink:0;transition:color .15s;padding:0;align-self:stretch}
.log-del:hover{color:#e06060}
.log-row{cursor:pointer}

/* UPDATE TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(140px);background:#1e1e1e;border:1px solid var(--red);border-radius:6px;width:calc(100% - 32px);max-width:420px;z-index:200;transition:transform .4s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 4px 24px rgba(0,0,0,.7);overflow:hidden}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.toast-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.4s infinite}
.toast-title{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:14px;letter-spacing:1px;color:var(--white);flex:1}
.toast-arrow{font-size:12px;color:var(--mid);transition:transform .25s}
.toast.expanded .toast-arrow{transform:rotate(180deg)}
.toast-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.toast.expanded .toast-body{max-height:200px}
.toast-changelog{padding:0 14px 12px;border-top:1px solid #333}
.toast-changelog ul{list-style:none;padding:8px 0 10px;display:flex;flex-direction:column;gap:5px}
.toast-changelog li{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:13px;color:#bbb;letter-spacing:.5px;padding-left:14px;position:relative}
.toast-changelog li:before{content:">";position:absolute;left:0;color:var(--red)}
.toast-foot{display:flex;justify-content:flex-end;padding:0 14px 12px}
.toast-foot button{background:var(--red);border:none;color:#fff;font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:3px;cursor:pointer}
.toast-foot button:hover{filter:brightness(1.15)}
</style>
</head>

<script>
var VERSION = '1.0';
var WHATS_NEW = [
  'Tidsregistrering med Start och Stopp',
  'Redigera och radera enskilda poster',
  'Snabb tidsredigering - skriv 1030 for 10:30',
  'Total tid summeras automatiskt',
  'PDF export med alla poster',
  'Fungerar offline som installerad app'
];

var S = [];
var editIdx = null;
try { S = JSON.parse(localStorage.getItem('hesab_v2') || '[]'); } catch(e) {}
function save() { try { localStorage.setItem('hesab_v2', JSON.stringify(S)); } catch(e) {} }

// ── Clock ──
function updateClock() {
  var d = new Date();
  var p = function(n) { return String(n).padStart(2,'0'); };
  var el = document.getElementById('clock-time');
  if (el) el.innerHTML = p(d.getHours()) + '<span class="colon">:</span>' + p(d.getMinutes()) + '<span class="colon">:</span>' + p(d.getSeconds());
  var days = ['Sondag','Mandag','Tisdag','Onsdag','Torsdag','Fredag','Lordag'];
  var months = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
  var ed = document.getElementById('clock-date');
  if (ed) ed.textContent = days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

// ── Helpers ──
function nowP() {
  var d = new Date();
  var p = function(n) { return String(n).padStart(2,'0'); };
  return { time: p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds()), date: d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()) };
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function calcDur(a, b) {
  try {
    var s = new Date(a.date+'T'+a.time);
    var e = new Date(b.date+'T'+b.time);
    var diff = Math.round((e-s)/1000);
    if (diff < 0) return '';
    var h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), sec = diff%60;
    if (h > 0) return h+'h '+String(m).padStart(2,'0')+'m';
    if (m > 0) return m+'m '+String(sec).padStart(2,'0')+'s';
    return sec+'s';
  } catch(e) { return ''; }
}

function totalTime() {
  var total = 0;
  for (var i = 0; i < S.length; i++) {
    if (S[i].start && S[i].stopp) {
      try {
        var a = new Date(S[i].start.date+'T'+S[i].start.time);
        var b = new Date(S[i].stopp.date+'T'+S[i].stopp.time);
        var diff = Math.round((b-a)/1000);
        if (diff > 0) total += diff;
      } catch(e) {}
    }
  }
  if (total === 0) return '0m';
  var h = Math.floor(total/3600), m = Math.floor((total%3600)/60), s = total%60;
  if (h > 0) return h+'h '+String(m).padStart(2,'0')+'m';
  if (m > 0) return m+'m '+String(s).padStart(2,'0')+'s';
  return s+'s';
}

function parseTime(v) {
  v = v.trim().replace(/[^0-9:]/g,'');
  if (!v) return '';
  if (v.indexOf(':') !== -1) {
    var parts = v.split(':');
    return parts[0].padStart(2,'0')+':'+(parts[1]||'00').padStart(2,'0')+':'+(parts[2]||'00').padStart(2,'0');
  }
  if (v.length <= 2) return v.padStart(2,'0')+':00:00';
  if (v.length <= 4) return v.slice(0,2)+':'+v.slice(2).padEnd(2,'0')+':00';
  return v.slice(0,2)+':'+v.slice(2,4)+':'+v.slice(4,6).padEnd(2,'0');
}

function parseDate(v) {
  v = v.trim().replace(/[^0-9-]/g,'');
  if (!v) return '';
  var yyyy = String(new Date().getFullYear());
  if (v.indexOf('-') !== -1) {
    var p = v.split('-');
    if (p[0].length === 4) return v;
    if (p.length === 3 && p[2].length === 4) return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
    return v;
  }
  if (v.length === 4) return yyyy+'-'+v.slice(2,4).padStart(2,'0')+'-'+v.slice(0,2).padStart(2,'0');
  if (v.length === 8) return v.slice(4,8)+'-'+v.slice(2,4).padStart(2,'0')+'-'+v.slice(0,2).padStart(2,'0');
  return v;
}

// ── Stamp ──
function stamp(type) {
  var inp = document.getElementById('oi');
  var obj = inp.value.trim();
  if (!obj) { inp.classList.add('err'); inp.focus(); setTimeout(function(){ inp.classList.remove('err'); },600); return; }
  var t = nowP();
  if (type === 'START') {
    S.unshift({ obj:obj, start:t, stopp:null });
  } else {
    var found = false;
    for (var i = 0; i < S.length; i++) { if (!S[i].stopp) { S[i].stopp=t; found=true; break; } }
    if (!found) S.unshift({ obj:obj, start:null, stopp:t });
  }
  save(); updateStatus(); render();
}

// ── Status ──
function updateStatus() {
  var dot = document.getElementById('sd');
  var txt = document.getElementById('st');
  var open = null;
  for (var i = 0; i < S.length; i++) { if (!S[i].stopp) { open=S[i]; break; } }
  if (open) { dot.className='dot on'; txt.textContent='Aktiv: '+open.obj; txt.style.color='#e0e0e0'; }
  else { dot.className='dot'; txt.textContent='Ingen aktiv session'; txt.style.color=''; }
}

// ── Render ──
function makeTimeRow(tag, cls, t) {
  var el = document.createElement('div');
  el.className = 'log-time-row';
  el.innerHTML = '<span class="tag '+cls+'">'+tag+'</span><span class="t-time">'+t.time+'</span><span class="t-date">'+t.date+'</span>';
  return el.outerHTML;
}

function render() {
  var list = document.getElementById('ll');
  document.getElementById('ec').textContent = S.length;
  document.getElementById('tc').textContent = totalTime();
  if (!S.length) { list.innerHTML = '<div class="empty">Inga registreringar annu</div>'; return; }
  var html = '';
  for (var i = 0; i < S.length; i++) {
    var s=S[i], num=S.length-i, d=(s.start&&s.stopp)?calcDur(s.start,s.stopp):'';
    var times = '<div class="log-times">';
    if (s.start) times += makeTimeRow('START','tag-start',s.start);
    if (s.stopp) times += makeTimeRow('STOPP','tag-stopp',s.stopp);
    if (s.start&&!s.stopp) times += '<span class="open-badge">PAGAR</span>';
    times += '</div>';
    html += '<div class="log-row" onclick="openEdit('+i+')">'
      +'<div class="log-num">'+num+'</div>'
      +'<div class="log-body"><div class="log-obj-name">'+esc(s.obj)+'</div>'+times+'</div>'
      +'<div class="'+(d?'log-dur has-dur':'log-dur')+'">'+(d||'&mdash;')+'</div>'
      +'<button class="log-del" onclick="deleteEntry(event,'+i+')">&#10005;</button>'
      +'</div>';
  }
  list.innerHTML = html;
}

// ── Edit modal ──
function openEdit(idx) {
  editIdx = idx;
  var s = S[idx];
  document.getElementById('m-obj').value        = s.obj||'';
  document.getElementById('m-start-time').value = s.start?s.start.time:'';
  document.getElementById('m-start-date').value = s.start?s.start.date:'';
  document.getElementById('m-stopp-time').value = s.stopp?s.stopp.time:'';
  document.getElementById('m-stopp-date').value = s.stopp?s.stopp.date:'';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editIdx=null; }

function saveEdit() {
  if (editIdx===null) return;
  var obj       = document.getElementById('m-obj').value.trim();
  var startTime = parseTime(document.getElementById('m-start-time').value);
  var startDate = parseDate(document.getElementById('m-start-date').value);
  var stoppTime = parseTime(document.getElementById('m-stopp-time').value);
  var stoppDate = parseDate(document.getElementById('m-stopp-date').value);
  if (!obj) { document.getElementById('m-obj').classList.add('err'); setTimeout(function(){document.getElementById('m-obj').classList.remove('err');},600); return; }
  S[editIdx].obj   = obj;
  S[editIdx].start = (startTime&&startDate)?{time:startTime,date:startDate}:null;
  S[editIdx].stopp = (stoppTime&&stoppDate)?{time:stoppTime,date:stoppDate}:null;
  save(); updateStatus(); render(); closeModal();
}

function deleteEntry(e, idx) {
  e.stopPropagation();
  if (!confirm('Radera denna post?')) return;
  S.splice(idx,1); save(); updateStatus(); render();
}

document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ── Clear & Export ──
function clearLog() {
  if (!S.length||!confirm('Rensa alla registreringar?')) return;
  S=[]; save(); updateStatus(); render();
}

function exportPDF() {
  if (!S.length) return;
  var rev=S.slice().reverse(), rows='';
  for (var i=0;i<rev.length;i++) {
    var s=rev[i], d=(s.start&&s.stopp)?calcDur(s.start,s.stopp):'&mdash;';
    rows += '<tr><td>'+(i+1)+'</td><td>'+esc(s.obj)+'</td>'
      +'<td>'+(s.start?s.start.time+' '+s.start.date:'&mdash;')+'</td>'
      +'<td>'+(s.stopp?s.stopp.time+' '+s.stopp.date:'Pagar')+'</td>'
      +'<td class="dur">'+d+'</td></tr>';
  }
  var htm = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>HESAB</title>'
    +'<style>body{font-family:Arial,sans-serif;font-size:12px;margin:30px;color:#111}'
    +'h1{font-size:22px;margin-bottom:6px}p{color:#666;font-size:11px;margin-bottom:20px}'
    +'table{width:100%;border-collapse:collapse}'
    +'th{background:#cc1f1f;color:#fff;padding:9px 12px;text-align:left;font-size:11px;text-transform:uppercase}'
    +'td{padding:8px 12px;border-bottom:1px solid #e0e0e0}'
    +'tr:nth-child(even) td{background:#f7f7f7}.dur{color:#b07800;font-weight:bold}'
    +'</style></head><body>'
    +'<h1>HESAB &mdash; Tidsregistrering</h1>'
    +'<p>Exporterad: '+new Date().toLocaleString('sv-SE')+' | '+S.length+' objekt | Total tid: '+totalTime()+'</p>'
    +'<table><thead><tr><th>#</th><th>Objekt</th><th>Start</th><th>Stopp</th><th>Tid</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></body></html>';
  var w=window.open('','_blank');
  if(w){w.document.write(htm);w.document.close();w.print();}
}

// ── Event listeners ──
document.getElementById('btn-start').addEventListener('click', function(){ stamp('START'); });
document.getElementById('btn-stopp').addEventListener('click', function(){ stamp('STOPP'); });
document.getElementById('btn-clear').addEventListener('click', clearLog);
document.getElementById('btn-export').addEventListener('click', exportPDF);
document.getElementById('m-save').addEventListener('click', saveEdit);
document.getElementById('m-cancel').addEventListener('click', closeModal);
document.getElementById('m-delete').addEventListener('click', function(){
  if(editIdx===null) return;
  if(!confirm('Radera denna post?')) return;
  S.splice(editIdx,1); save(); updateStatus(); render(); closeModal();
});
document.getElementById('oi').addEventListener('keydown', function(e){ if(e.key==='Enter') stamp('START'); });

render();
updateStatus();

// ── Toast ──
function showToast() {
  var toast = document.getElementById('update-toast');
  var ver   = document.getElementById('toast-ver');
  var list  = document.getElementById('toast-changes');
  if (!toast) return;
  if (ver) ver.textContent = 'v'+VERSION;
  if (list) list.innerHTML = WHATS_NEW.map(function(n){ return '<li>'+n+'</li>'; }).join('');
  setTimeout(function(){ toast.classList.add('show'); }, 500);
}

function toggleToast() { document.getElementById('update-toast').classList.toggle('expanded'); }

function reloadApp() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(function(reg){
      if (reg&&reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    });
  }
  window.location.reload();
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg){
    reg.update();
    reg.addEventListener('updatefound', function(){
      var nw = reg.installing;
      nw.addEventListener('statechange', function(){
        if (nw.state==='installed' && navigator.serviceWorker.controller) showToast();
      });
    });
  }).catch(function(){});
}
</script>

<div class="toast" id="update-toast">
  <div class="toast-top" onclick="toggleToast()">
    <div class="toast-dot"></div>
    <div class="toast-title">Ny version tillganglig <span id="toast-ver"></span></div>
    <span class="toast-arrow">&#9660;</span>
  </div>
  <div class="toast-body">
    <div class="toast-changelog">
      <ul id="toast-changes"></ul>
    </div>
    <div class="toast-foot">
      <button onclick="reloadApp()">Installera &amp; starta om</button>
    </div>
  </div>
</div>
</body>
</html>
